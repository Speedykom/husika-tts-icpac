  kdj:
    name: "Karamojong"
    preferred_engine: "coqui_vits"
    espeak_support: false
    mms_support: false
    coqui_vits_support: true
    status: "Beta"

# Engine metadata
engines:
  piper:
    description: "Piper TTS + ONNX neural synthesis"
    model_source: "huggingface"
    model_base: "rhasspy/piper-voices"
    latency_ms: 500
    quality: "high"

  espeak:
    description: "eSpeak NG — fast, rule-based, offline"
    latency_ms: 100
    quality: "functional"

  mms:
    description: "Meta MMS — neural, 1200+ languages"
    model_source: "huggingface"
    model_base: "facebook/mms-tts"
    latency_ms: 2000
    quality: "good"

  coqui_vits:
    description: "Coqui VITS — in-house fine-tunes for low-resource languages"
    model_source: "huggingface"
    latency_ms: 2000
    quality: "good"
