    status: "Ready"

  lug:
    name: "Luganda"
    preferred_engine: "mms"
    espeak_support: false
    mms_support: true
    status: "Ready"

  kin:
    name: "Kinyarwanda"
    preferred_engine: "mms"
    espeak_support: false
