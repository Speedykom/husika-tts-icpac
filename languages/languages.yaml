# HUSIKA TTS — Language configuration (Sprint 1)
#
# Each language lists which engines can synthesize it.
# preferred_engine is tried first; the router falls back automatically.

languages:
  swa:
    name: "Swahili"
    preferred_engine: "piper"
    piper_support: true
    espeak_support: true
    mms_support: true
    status: "Ready"

  amh:
    name: "Amharic"
    preferred_engine: "mms"
    espeak_support: false
    mms_support: true
    status: "Ready"

  ara:
    name: "Arabic"
    preferred_engine: "piper"
    piper_support: true
    espeak_support: true
    mms_support: true
    status: "Ready"

  som:
