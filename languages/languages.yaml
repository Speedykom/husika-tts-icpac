  din:
    name: "Dinka"
    preferred_engine: "mms"
    espeak_support: false
    mms_support: true
    status: "Ready"

  en:
    name: "English"
    preferred_engine: "piper"
    piper_support: true
    espeak_support: true
    mms_support: true
    status: "Ready"

  fr:
    name: "French"
    preferred_engine: "piper"
    piper_support: true
    espeak_support: true
    mms_support: true
    status: "Ready"

  pko:
    name: "Pokoot"
    preferred_engine: "mms"
