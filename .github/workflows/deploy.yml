name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    outputs:
      sha_tag: ${{ steps.vars.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA tag
        id: vars
        run: echo "sha_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        env:
          DOCKER_CONFIG: /tmp/docker-build-config
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: SSH and roll the stack
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /srv/husika
            export IMAGE="ghcr.io/speedykom/husika-tts-icpac:${{ needs.build.outputs.sha_tag }}"
            grep -q '^IMAGE=' .env && sed -i "s|^IMAGE=.*|IMAGE=${IMAGE}|" .env || echo "IMAGE=${IMAGE}" >> .env
            docker compose pull
            docker compose down --remove-orphans
            docker compose up -d
            docker image prune -f

      - name: Health check
        run: |
          set -euo pipefail
          url="https://${{ secrets.DEPLOY_HOST }}/health"
          for i in $(seq 1 30); do
            if curl -fsS --max-time 5 "$url" >/dev/null; then
              echo "health ok"
              exit 0
            fi
            echo "attempt $i failed; sleeping 10s"
            sleep 10
          done
          echo "health check failed after 5 minutes"
          exit 1
